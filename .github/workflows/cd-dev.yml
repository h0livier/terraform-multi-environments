name: CD Terraform

on:
    workflow_dispatch:
        inputs:
            chdir:
                description: 'The directory to run terraform validate in'
                required: true
                type: choice
                options:
                    - envs/dev
                    - envs/prod

jobs:
    validate:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Azure Login
              uses: azure/login@v2
              with:
                client-id: ${{ secrets.AZURE_CLIENT_ID }}
                tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Validate Terraform (${{ inputs.chdir }})
              shell: bash
              run: |
                terraform -chdir=${{ inputs.chdir }} init
                terraform -chdir=${{ inputs.chdir }} validate

            - name: Apply Terraform (${{ inputs.chdir }})
              shell: bash
              run: terraform -chdir=${{ inputs.chdir }} apply -auto-approve
